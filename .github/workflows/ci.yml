name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Local harness tests (Python, any platform) ──────────────────────────
  harness:
    name: Harness tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Run all Python-only tests
        run: python3 -m pytest tests/bootstrap/ tests/compiler/ tests/prelude/ tests/sanity/ tests/demos/ -v --tb=short

  # ── Reaver runtime gate (parallel matrix) ─────────────────────────────
  # Three parallel jobs against vendor/reaver's plan-assembler:
  #   - smoke        : minimal end-to-end fixtures (test_smoke.py +
  #                    RPLAN I/O + the repl_calc demo)
  #   - differential : harness ≡ Reaver fixtures (test_differential.py)
  # Same Nix + plan-assembler setup; the actions/cache step lets the second
  # job hit the warm Nix store rather than rebuilding GHC from scratch.
  reaver:
    name: Reaver ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            target: tests/reaver/test_smoke.py tests/reaver/test_rplan_io.py tests/reaver/test_repl_calc.py
          - suite: differential
            target: tests/reaver/test_differential.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('vendor/reaver/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Pre-build plan-assembler
        working-directory: vendor/reaver
        run: nix develop --command cabal build plan-assembler

      - name: Run ${{ matrix.suite }} tests
        run: python3 -m pytest ${{ matrix.target }} -v --tb=short --junit-xml=/tmp/junit.xml

      - name: Per-test pass/fail to job summary
        if: always()
        run: |
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET
          tree = ET.parse('/tmp/junit.xml')
          root = tree.getroot()
          suite = root.find('testsuite') or root
          totals = {'pass': 0, 'fail': 0, 'error': 0, 'skip': 0}
          rows = []
          for case in suite.iter('testcase'):
              name = case.get('name', '?')
              t = float(case.get('time', '0') or '0')
              if case.findall('failure'):
                  res, sym = 'FAIL', ':x:'; totals['fail'] += 1
              elif case.findall('error'):
                  res, sym = 'ERROR', ':boom:'; totals['error'] += 1
              elif case.findall('skipped'):
                  res, sym = 'SKIP', ':fast_forward:'; totals['skip'] += 1
              else:
                  res, sym = 'PASS', ':white_check_mark:'; totals['pass'] += 1
              rows.append((name, res, sym, t))
          print(f"## ${{ matrix.suite }} — "
                f"{totals['pass']} passed, {totals['fail']} failed, "
                f"{totals['error']} errors, {totals['skip']} skipped")
          print()
          print('| Result | Test | Time |')
          print('|---|---|---|')
          for name, res, sym, t in rows:
              print(f'| {sym} `{res}` | `{name}` | {t:.2f}s |')
          EOF
