name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Local harness tests (Python, any platform) ──────────────────────────
  harness:
    name: Harness tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest blake3

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Install marduk from vendor
        run: pip install -e vendor/marduk/packages/marduk

      # Skip the tutorial notebook smoke tests by default — they import
      # the full prelude per notebook and re-run every cell, which is
      # slow.  Opt-in only when this PR/push actually touches tutorial
      # files or the kernel evaluator they exercise.  See
      # tests/bootstrap/test_tutorials.py's pytestmark.
      - name: Detect tutorial changes
        id: tut_changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tutorials:
              - 'tutorials/**'
              - 'bootstrap/jupyter_kernel.py'

      - name: Run all Python-only tests
        env:
          GG_RUN_TUTORIALS: ${{ steps.tut_changed.outputs.tutorials == 'true' && '1' || '0' }}
        run: python3 -m pytest tests/bootstrap/ tests/compiler/ tests/prelude/ tests/sanity/ tests/demos/ -v --tb=short

  # ── Reaver runtime gate (parallel matrix) ─────────────────────────────
  # Three parallel jobs against vendor/reaver's plan-assembler:
  #   - smoke        : minimal end-to-end fixtures (test_smoke.py +
  #                    RPLAN I/O + the repl_calc demo)
  #   - selfhost     : Phase G byte-identity gate (test_selfhost.py)
  #   - differential : harness ≡ Reaver fixtures (test_differential.py)
  # Same Nix + plan-assembler setup; the actions/cache step lets the second
  # job hit the warm Nix store rather than rebuilding GHC from scratch.
  reaver:
    name: Reaver ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            target: tests/reaver/test_smoke.py tests/reaver/test_rplan_io.py tests/reaver/test_repl_calc.py
          - suite: selfhost
            target: tests/reaver/test_selfhost.py
          - suite: differential
            target: tests/reaver/test_differential.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest blake3

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Install marduk from vendor
        run: pip install -e vendor/marduk/packages/marduk

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('vendor/reaver/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Pre-build plan-assembler
        working-directory: vendor/reaver
        run: nix develop --command cabal build plan-assembler

      - name: Run ${{ matrix.suite }} tests
        run: python3 -m pytest ${{ matrix.target }} -v --tb=short --junit-xml=/tmp/junit.xml

      - name: Per-test pass/fail to job summary
        if: always()
        run: |
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET
          tree = ET.parse('/tmp/junit.xml')
          root = tree.getroot()
          suite = root.find('testsuite') or root
          totals = {'pass': 0, 'fail': 0, 'error': 0, 'skip': 0}
          rows = []
          for case in suite.iter('testcase'):
              name = case.get('name', '?')
              t = float(case.get('time', '0') or '0')
              if case.findall('failure'):
                  res, sym = 'FAIL', ':x:'; totals['fail'] += 1
              elif case.findall('error'):
                  res, sym = 'ERROR', ':boom:'; totals['error'] += 1
              elif case.findall('skipped'):
                  res, sym = 'SKIP', ':fast_forward:'; totals['skip'] += 1
              else:
                  res, sym = 'PASS', ':white_check_mark:'; totals['pass'] += 1
              rows.append((name, res, sym, t))
          print(f"## ${{ matrix.suite }} — "
                f"{totals['pass']} passed, {totals['fail']} failed, "
                f"{totals['error']} errors, {totals['skip']} skipped")
          print()
          print('| Result | Test | Time |')
          print('|---|---|---|')
          for name, res, sym, t in rows:
              print(f'| {sym} `{res}` | `{name}` | {t:.2f}s |')
          EOF

  # ── Python-less self-host build (Phase I) ─────────────────────────────
  # Builds Plan Asm output from a Gallowglass source using ONLY the
  # vendored compiler/dist/Compiler.plan + Reaver.  Python is not in the
  # build path: no bootstrap/, no compile_program, no emit_program calls.
  # This is the 1.0.0-rc3 acceptance gate for "the self-host can replace
  # the Python bootstrap".  See tools/build-self-host.sh and
  # compiler/dist/MANIFEST.json.
  self_host_build:
    name: Self-host build (Python-less)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('vendor/reaver/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Pre-build plan-assembler
        working-directory: vendor/reaver
        run: nix develop --command cabal build plan-assembler

      - name: Verify seed Compiler.plan integrity
        run: |
          set -e
          # The vendored seed must match its recorded BLAKE3 in MANIFEST.json
          # — otherwise the bootstrap chain is broken.  Recompute and diff.
          PLAN_BLAKE3=$(python3 -c "import blake3; print(blake3.blake3(open('compiler/dist/Compiler.plan','rb').read()).hexdigest())")
          MANIFEST_BLAKE3=$(python3 -c "import json; print(json.load(open('compiler/dist/MANIFEST.json'))['compiler_plan']['blake3'])")
          if [ "$PLAN_BLAKE3" != "$MANIFEST_BLAKE3" ]; then
            echo "ERROR: compiler/dist/Compiler.plan BLAKE3 mismatch."
            echo "       actual:   $PLAN_BLAKE3"
            echo "       manifest: $MANIFEST_BLAKE3"
            exit 1
          fi
          # (We only use Python here to compute BLAKE3 — not to compile.
          # Builds-from-source below use NO Python.)
          pip install blake3 >/dev/null 2>&1 || true

      - name: Smoke build — trivial source
        run: |
          echo 'let main = 42' > /tmp/simple.gls
          tools/build-self-host.sh /tmp/simple.gls --output /tmp/simple.plan
          diff <(printf '@boot\n(#bind Compiler_main 42)\n') /tmp/simple.plan

      - name: Smoke build — small recursion fixture
        run: |
          cat > /tmp/recur.gls <<'EOF'
          external mod Reaver.BPLAN { sub : Nat → Nat → Nat }
          let count : Nat → Nat
            = λ n → match n {
                | 0 → 100
                | _ → count (Reaver.BPLAN.sub n 1)
              }
          let main = count 3
          EOF
          tools/build-self-host.sh /tmp/recur.gls --output /tmp/recur.plan
          # Must produce non-empty Plan Asm with the expected bind names.
          test -s /tmp/recur.plan
          grep -q 'Compiler_count' /tmp/recur.plan
          grep -q 'Compiler_main' /tmp/recur.plan

