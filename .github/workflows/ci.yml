name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Local harness tests (Python, any platform) ──────────────────────────
  harness:
    name: Harness tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Run all Python-only tests
        run: python3 -m pytest tests/bootstrap/ tests/compiler/ tests/prelude/ tests/sanity/ tests/demos/ -v --tb=short

  # ── Reaver runtime gate (parallel matrix) ─────────────────────────────
  # Two parallel jobs against vendor/reaver's plan-assembler:
  #   - smoke        : 3 minimal end-to-end fixtures (test_smoke.py)
  #   - differential : 9 fixtures asserting harness ≡ Reaver (test_differential.py)
  # Same Nix + plan-assembler setup; the actions/cache step lets the second
  # job hit the warm Nix store rather than rebuilding GHC from scratch.
  reaver:
    name: Reaver ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            target: tests/reaver/test_smoke.py
          - suite: differential
            target: tests/reaver/test_differential.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Set up vendored upstreams (vendor.lock)
        run: ./tools/vendor.sh

      - name: Verify vendor pins
        run: ./tools/vendor.sh verify

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('vendor/reaver/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Pre-build plan-assembler
        working-directory: vendor/reaver
        run: nix develop --command cabal build plan-assembler

      - name: Run ${{ matrix.suite }} tests
        run: python3 -m pytest ${{ matrix.target }} -v --tb=short
