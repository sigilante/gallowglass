name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Local harness tests (Python, any platform) ──────────────────────────
  harness:
    name: Harness tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run PLAN evaluator tests
        run: python3 tests/sanity/test_plan.py

      - name: Run seed round-trip tests
        run: python3 tests/sanity/test_seed.py

      - name: Run bootstrap structural tests
        run: python3 tests/bootstrap/test_bootstrap.py

      - name: Run bootstrap lexer tests
        run: python3 tests/bootstrap/test_lexer.py

      - name: Run bootstrap parser tests
        run: python3 tests/bootstrap/test_parser.py

      - name: Run bootstrap scope resolver tests
        run: python3 tests/bootstrap/test_scope.py

      - name: Run bootstrap type checker tests
        run: python3 tests/bootstrap/test_typecheck.py

      - name: Run bootstrap codegen tests
        run: python3 tests/bootstrap/test_codegen.py

  # ── xocore PLAN VM seed validation (Linux x86-64 only) ──────────────────
  plan-vm:
    name: planvm seed validation (xocore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Clone xocore-tech/PLAN
        run: |
          git clone --depth=1 https://github.com/xocore-tech/PLAN.git /tmp/planvm-src

      - name: Build PLAN VM
        working-directory: /tmp/planvm-src
        run: |
          nix develop --command make all

      - name: Install planvm
        run: |
          cp /tmp/planvm-src/x/plan /usr/local/bin/planvm
          planvm --help 2>&1 || true
          echo "planvm: $(which planvm)"

      - name: Smoke-test VM (Sire REPL on empty input)
        working-directory: /tmp/planvm-src
        run: |
          echo "" | timeout 10 x/plan xseed/sire.seed || true

      - name: Validate Python-compiled seeds against planvm
        run: |
          PLANVM=planvm python3 tests/planvm/test_seed_planvm.py
